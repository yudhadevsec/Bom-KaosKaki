<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bom Kaos Kaki — C2 Login</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --bg-card-hover: #222837;
            --bg-input: #0f131f;
            --border: #2a3040;
            --border-active: #3b82f6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-green: #22c55e;
            --accent-green-dim: #166534;
            --accent-red: #ef4444;
            --accent-red-dim: #7f1d1d;
            --accent-yellow: #eab308;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            --radius: 8px;
            --radius-lg: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(40px, 40px);
            }
        }

        /* Matrix rain effect (subtle) */
        .matrix-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.04;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: var(--accent-green);
            line-height: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .matrix-bg span {
            display: block;
            white-space: nowrap;
            animation: matrixFall 15s linear infinite;
        }

        @keyframes matrixFall {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100vh);
            }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 36px 36px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
            background: rgba(26, 31, 46, 0.95);
            animation: cardEnter 0.5s ease-out;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 42px;
            margin-bottom: 12px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-green);
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 400;
        }

        .login-subtitle span {
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-wrapper .icon {
            padding: 0 0 0 14px;
            font-size: 16px;
            color: var(--text-muted);
            user-select: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        .input-wrapper input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px var(--bg-input) inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
        }

        .toggle-password {
            padding: 0 14px 0 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: color 0.15s;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .checkbox-wrapper input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: var(--bg-input);
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .checkbox-wrapper input[type="checkbox"]:checked {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
            background-size: contain;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }

        .forgot-link:hover {
            color: var(--accent-cyan);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent-green);
            border: none;
            border-radius: var(--radius);
            color: #000;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            background: #16a34a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius);
            color: var(--accent-red);
            font-size: 13px;
            margin-bottom: 16px;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .success-message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: var(--radius);
            color: var(--accent-green);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .success-message.show {
            display: flex;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .status-dot.online {
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
        }

        .status-dot.offline {
            background: var(--text-muted);
        }

        .server-status {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
            text-align: center;
            padding: 8px;
            border-radius: var(--radius);
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .version-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            background: var(--accent-green-dim);
            color: var(--accent-green);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* 2FA fields (hidden by default) */
        #mfa-section {
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }

            to {
                opacity: 1;
                max-height: 200px;
            }
        }

        .mfa-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-family: 'Fira Code', monospace;
            padding: 12px;
        }

        .mfa-input::placeholder {
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 12px;
            }

            .login-card {
                padding: 28px 20px 24px;
            }

            .login-title {
                font-size: 20px;
            }
        }

        /* Brute force protection indicator */
        .attempt-counter {
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 4px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <!-- Subtle matrix background -->
    <div class="matrix-bg" id="matrix-bg"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">💀</div>
                <div class="login-title">Bom Kaos Kaki</div>
                <div class="login-subtitle">C2 <span>Penetration Testing</span> Panel</div>
                <div style="margin-top:8px"><span class="version-badge">v3.5</span></div>
            </div>

            <div class="divider">Authentication Required</div>

            <!-- Error message -->
            <div class="error-message" id="error-message">
                <span>⚠️</span>
                <span id="error-text">Invalid credentials</span>
            </div>

            <!-- Success message (for session restore) -->
            <div class="success-message" id="success-message">
                <span>✓</span>
                <span id="success-text">Session restored</span>
            </div>

            <!-- Login Form -->
            <form id="login-form" autocomplete="off" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" id="username" placeholder="Enter username" autocomplete="username"
                            spellcheck="false" required oninput="clearError()">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔑</span>
                        <input type="password" id="password" placeholder="Enter password"
                            autocomplete="current-password" required oninput="clearError()">
                        <button type="button" class="toggle-password" onclick="togglePassword()" tabindex="-1">
                            👁️
                        </button>
                    </div>
                </div>

                <!-- 2FA Section (shown when server requires it) -->
                <div id="mfa-section">
                    <div class="form-group">
                        <label for="mfa-code">Two-Factor Authentication Code</label>
                        <div class="input-wrapper">
                            <span class="icon">🔐</span>
                            <input type="text" id="mfa-code" class="mfa-input" placeholder="000000" maxlength="6"
                                inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code">
                        </div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="remember-me">
                        <span>Remember session</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="showResetModal(event)">Reset token?</a>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span class="btn-text">Authenticate</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="server-status" id="server-status">
                <span class="status-dot offline" id="status-dot"></span>
                <span id="status-text">Checking server connection...</span>
            </div>

            <div class="attempt-counter" id="attempt-counter"></div>

            <div class="login-footer">
                Authorized security testing only.<br>
                All actions are logged and auditable.
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // CONFIGURATION
        // ============================================================================
        const API_BASE = 'https://bomkaoskaki.vercel.app/api';
        const SESSION_KEY = 'bk_session_token';
        const USER_KEY = 'bk_user';
        const REMEMBER_KEY = 'bk_remember';

        let loginAttempts = 0;
        const MAX_ATTEMPTS = 5;
        let lockedUntil = 0;
        let mfaRequired = false;

        // ============================================================================
        // MATRIX BACKGROUND
        // ============================================================================
        function initMatrix() {
            const container = document.getElementById('matrix-bg');
            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
            const cols = Math.floor(window.innerWidth / 16);

            for (let i = 0; i < cols; i++) {
                const span = document.createElement('span');
                const length = 10 + Math.floor(Math.random() * 30);
                let text = '';
                for (let j = 0; j < length; j++) {
                    text += chars[Math.floor(Math.random() * chars.length)] + ' ';
                }
                span.textContent = text;
                span.style.position = 'absolute';
                span.style.left = (i * 16) + 'px';
                span.style.animationDuration = (10 + Math.random() * 20) + 's';
                span.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(span);
            }
        }

        // ============================================================================
        // TOGGLE PASSWORD VISIBILITY
        // ============================================================================
        function togglePassword() {
            const pwd = document.getElementById('password');
            const btn = document.querySelector('.toggle-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = '🙈';
            } else {
                pwd.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // ============================================================================
        // ERROR / MESSAGE HANDLING
        // ============================================================================
        function showError(msg) {
            const el = document.getElementById('error-message');
            document.getElementById('error-text').textContent = msg;
            el.classList.add('show');
            document.getElementById('success-message').classList.remove('show');
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            document.getElementById('success-text').textContent = msg;
            el.classList.add('show');
            document.getElementById('error-message').classList.remove('show');
        }

        function clearError() {
            document.getElementById('error-message').classList.remove('show');
        }

        // ============================================================================
        // BRUTE FORCE PROTECTION
        // ============================================================================
        function checkAttempts() {
            const now = Date.now();
            if (lockedUntil > now) {
                const remaining = Math.ceil((lockedUntil - now) / 1000);
                showError(`Too many attempts. Locked for ${remaining}s`);
                document.getElementById('login-btn').disabled = true;
                setTimeout(() => {
                    document.getElementById('login-btn').disabled = false;
                    checkAttempts();
                }, 1000);
                return false;
            }

            document.getElementById('attempt-counter').textContent =
                loginAttempts > 0 ? `Failed attempts: ${loginAttempts}/${MAX_ATTEMPTS}` : '';

            if (loginAttempts >= MAX_ATTEMPTS) {
                lockedUntil = Date.now() + 30000; // 30 second lockout
                loginAttempts = 0;
                showError('Too many failed attempts. Locked for 30 seconds');
                document.getElementById('login-btn').disabled = true;
                setTimeout(() => {
                    document.getElementById('login-btn').disabled = false;
                    checkAttempts();
                }, 30000);
                return false;
            }
            return true;
        }

        // ============================================================================
        // SERVER STATUS CHECK
        // ============================================================================
        async function checkServerStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            try {
                const res = await fetch(`${API_BASE}/health`, {
                    method: 'GET',
                    signal: AbortSignal.timeout(5000)
                });
                if (res.ok) {
                    dot.className = 'status-dot online';
                    text.textContent = 'Server connected — ready';
                    return true;
                }
            } catch { }

            dot.className = 'status-dot offline';
            text.textContent = 'Server unreachable — check connection';
            return false;
        }

        // ============================================================================
        // TOKEN MANAGEMENT
        // ============================================================================
        function getStoredToken() {
            return localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
        }

        function storeToken(token, remember = false) {
            if (remember) {
                localStorage.setItem(SESSION_KEY, token);
            } else {
                sessionStorage.setItem(SESSION_KEY, token);
            }
        }

        function clearToken() {
            localStorage.removeItem(SESSION_KEY);
            sessionStorage.removeItem(SESSION_KEY);
            localStorage.removeItem(USER_KEY);
            localStorage.removeItem(REMEMBER_KEY);
        }

        async function validateStoredSession() {
            const token = getStoredToken();
            if (!token) return false;

            try {
                const res = await fetch(`${API_BASE}/session/validate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ token }),
                    signal: AbortSignal.timeout(5000)
                });

                if (res.ok) {
                    const data = await res.json();
                    showSuccess(`Session restored — welcome back, ${data.username || 'operator'}`);
                    setTimeout(() => redirectToDashboard(), 1000);
                    return true;
                }
            } catch { }

            clearToken();
            return false;
        }

        // ============================================================================
        // LOGIN HANDLER
        // ============================================================================
        async function handleLogin(event) {
            event.preventDefault();
            clearError();

            if (!checkAttempts()) return false;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const mfaCode = document.getElementById('mfa-code').value.trim();
            const remember = document.getElementById('remember-me').checked;

            if (!username || !password) {
                showError('Username and password are required');
                return false;
            }

            const btn = document.getElementById('login-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const body = { username, password };
                if (mfaRequired && mfaCode) body.mfa_code = mfaCode;

                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: AbortSignal.timeout(10000)
                });

                const data = await res.json();

                if (res.status === 401) {
                    loginAttempts++;
                    showError(data.message || 'Invalid credentials');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    checkAttempts();
                    return false;
                }

                if (res.status === 403 && data.mfa_required) {
                    mfaRequired = true;
                    document.getElementById('mfa-section').style.display = 'block';
                    document.getElementById('mfa-code').focus();
                    showError('Two-factor authentication required');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return false;
                }

                if (!res.ok) {
                    showError(data.message || 'Authentication failed');
                    loginAttempts++;
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    checkAttempts();
                    return false;
                }

                // Success
                loginAttempts = 0;
                mfaRequired = false;

                const token = data.token || data.access_token;
                if (token) {
                    storeToken(token, remember);
                    if (remember) {
                        localStorage.setItem(USER_KEY, username);
                        localStorage.setItem(REMEMBER_KEY, 'true');
                    }
                }

                showSuccess(`Authenticated as ${username} — redirecting...`);

                setTimeout(() => redirectToDashboard(), 800);
                return true;

            } catch (e) {
                if (e.name === 'AbortError') {
                    showError('Connection timed out — server may be unreachable');
                } else {
                    showError('Network error — check server connection');
                }
                loginAttempts++;
                btn.classList.remove('loading');
                btn.disabled = false;
                checkAttempts();
                return false;
            }
        }

        // ============================================================================
        // REDIRECT TO DASHBOARD
        // ============================================================================
        function redirectToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ============================================================================
        // SESSION RESTORE / AUTO-LOGIN
        // ============================================================================
        async function tryAutoLogin() {
            // Check if we have a stored session
            const hasSession = await validateStoredSession();
            if (hasSession) return true;

            // Pre-fill username if remembered
            const rememberedUser = localStorage.getItem(USER_KEY);
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('password').focus();
            }

            // Check server status
            const serverUp = await checkServerStatus();
            if (!serverUp) {
                showError('Cannot reach C2 server. Verify the API endpoint.');
            }

            return false;
        }

        // ============================================================================
        // RESET TOKEN / FORGOT PASSWORD
        // ============================================================================
        function showResetModal(event) {
            event.preventDefault();
            const email = prompt('Enter your recovery email to reset your access token:');
            if (email && email.includes('@')) {
                fetch(`${API_BASE}/auth/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                }).then(() => {
                    showSuccess('If the email exists, a reset link has been sent');
                }).catch(() => {
                    showError('Reset request failed');
                });
            } else if (email) {
                showError('Invalid email format');
            }
        }

        // ============================================================================
        // KEYBOARD SHORTCUTS
        // ============================================================================
        document.addEventListener('keydown', (e) => {
            // Escape clears error
            if (e.key === 'Escape') {
                clearError();
                document.getElementById('mfa-section').style.display = 'none';
                mfaRequired = false;
            }

            // Ctrl+Shift+L — clear local session
            if (e.ctrlKey && e.shiftKey && e.key === 'L') {
                e.preventDefault();
                clearToken();
                showSuccess('Local session cleared');
            }
        });

        // ============================================================================
        // INIT
        // ============================================================================
        document.addEventListener('DOMContentLoaded', () => {
            initMatrix();
            tryAutoLogin();

            // Auto-focus username if not remembered
            if (!localStorage.getItem(USER_KEY)) {
                document.getElementById('username').focus();
            }

            // Check server on interval
            setInterval(checkServerStatus, 30000);
        });
    </script>

</body>

</html>
