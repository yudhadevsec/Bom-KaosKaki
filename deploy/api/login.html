<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANSIM-AIO - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1a1f2e;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #2a2f3e;
            width: 350px;
        }

        .login-box h2 {
            color: #00ff88;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #2a2f3e;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #00ff88;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            color: #0a0e17;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #00cc6a;
        }

        .error {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>🔐 RANSIM-AIO v3.0</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="error" id="errorMsg">Invalid credentials</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // GANTI PASSWORD DI SINI
            if (user === 'admin' && pass === 'ransim2024') {
                localStorage.setItem('ransim_auth', btoa(JSON.stringify({ user, time: Date.now() })));
                window.location.href = '/api/dashboard';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
