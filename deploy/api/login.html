<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-wrapper {
            width: 100%;
            max-width: 360px;
            padding: 40px;
            border: 1px solid #eaeaeb;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
        }

        .login-wrapper h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .login-wrapper p {
            font-size: 14px;
            color: #666666;
            margin-bottom: 32px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #444444;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            color: #111111;
            transition: border-color 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #111111;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #111111;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        .btn:hover {
            background-color: #333333;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <h2>Welcome Back</h2>
        <p>Please enter your credentials</p>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
            <div class="error" id="errorMsg">Invalid credentials. Please try again.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'ransim2024') {
                localStorage.setItem('ransim_auth', btoa(JSON.stringify({ user, time: Date.now() })));
                window.location.href = '/api/dashboard';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
